<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refazer Senha</title>
    <link rel="stylesheet" href="senha.Css">
</head>
<body>
    <div class="container">
        <div class="forms">
            <form action="">
                <h1 class="titulo">Refazer Senha</h1>
                <p class="sutitulo">Sua conta irá ser resetada. Por favor, digite uma nova senha para sua conta.</p>
                <div class="input-group w50">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" placeholder="Digite sua senha."required>
                </div>
                <div class="input-group w50">
                    <label for="confirmar senha">Confirmar Senha</label>
                    <input type="password" name="confirmar senha" id="confirmar senha" placeholder="Confirme sua senha" required>
                </div>
                <button type="submit" class="Btn">Enviar Senha</button>
            </form>
        </div>
        <div class="image-container">
            <img src="src/imagem/Rectangle 20 (1).png" alt="Imagem refazer senha">
        </div>
    </div>
</body>
</html>
